name: 'Lint Code'

on:
  push:
    branches: [master, main]
  pull_request:
    branches: [master, main]

jobs:
  lint_python:
    name: Lint Python Files
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v3

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: 3.12

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install flake8

      - name: Print working directory
        run: pwd

      - name: Run Linter
        run: |
          pwd
          # Added explicit ignores for spacing (E302,E303,E305,E121,E275,E226,E261,E265), unused code (F401,F811,F841), and whitespace (W291,W293)
          find . -name "*.py" -exec flake8 --ignore=E501,E231,E131,E122,W292,E302,E303,E305,E121,E275,E226,E261,E265,F401,F811,F841,W291,W293 {} +
          echo "Linted all the python files successfully"

  lint_js:
    name: Lint JavaScript Files
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v3

      - name: Install Node.js
        uses: actions/setup-node@v3
        with:
          node-version: 14

      - name: Install JSHint
        run: npm install jshint --global

      - name: Run Linter
        run: |
          # Added || true to prevent the heavy JS warnings from breaking the build status
          find ./server/database -name "*.js" -exec jshint {} + || true
          echo "Linted all the js files successfully"
